<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=240, height=282, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>R1 Photo Scan Test</title>
    <script src="./zxing-browser.min.js?v=2"></script>
    <style>
      :root {
        --bg: #111111;
        --panel: #1d1d1d;
        --line: #343434;
        --text: #f7f1e7;
        --muted: #b9ad9a;
        --accent: #f97316;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 240px;
        height: 282px;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, sans-serif;
      }

      body {
        padding: 5px;
      }

      .app {
        height: 100%;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 4px;
      }

      .build {
        padding: 3px 6px;
        border-radius: 999px;
        background: rgba(249, 115, 22, 0.16);
        color: #ffb37a;
        font-size: 9px;
        font-weight: 700;
      }

      .card,
      .debug {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--panel);
      }

      .card {
        padding: 5px;
      }

      .status-value {
        font-size: 10px;
        font-weight: 700;
        word-break: break-word;
      }

      video,
      img {
        width: 100%;
        height: 38px;
        border-radius: 8px;
        background: #000;
        object-fit: cover;
        display: block;
      }

      img {
        margin-top: 3px;
      }

      .buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 5px;
      }

      button {
        appearance: none;
        min-height: 24px;
        border: 1px solid var(--line);
        border-radius: 9px;
        background: #2a2a2a;
        color: var(--text);
        font-size: 9px;
        font-weight: 700;
        padding: 0 4px;
      }

      button.primary {
        background: var(--accent);
        border-color: #fdba74;
        color: #1a1209;
      }

      .scroll {
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
        display: grid;
        gap: 4px;
        padding-right: 2px;
        -webkit-overflow-scrolling: touch;
      }

      .scroll::-webkit-scrollbar,
      .debug::-webkit-scrollbar {
        width: 0;
        height: 0;
      }

      .debug {
        padding: 5px;
        font-size: 8px;
        line-height: 1.25;
        white-space: pre-wrap;
        word-break: break-word;
        overflow: auto;
        min-height: 48px;
      }

      .barcode {
        font-size: 10px;
        font-weight: 700;
      }

      .small {
        font-size: 9px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="top">
        <div class="build">PHOTO-2026-03-04-Q</div>
        <div class="status-value" id="status">Idle</div>
      </div>

      <div class="card">
        <video id="video" autoplay muted playsinline></video>
        <img id="photoPreview" alt="Captured photo preview" />
      </div>

      <div class="scroll">
        <div class="card">
          <div class="buttons">
            <button class="primary" id="openMainBtn" type="button">Open Main</button>
            <button id="openDefaultBtn" type="button">Open Default</button>
            <button class="primary" id="takePhotoBtn" type="button">Take Photo</button>
            <button id="scanPhotoBtn" type="button">Scan Photo</button>
            <button id="flipBtn" type="button">Flip Pref</button>
            <button id="stopBtn" type="button">Stop</button>
          </div>
        </div>

        <div class="card">
          <div class="small" id="prefLabel">pref: environment</div>
          <div class="barcode" id="barcodeText">No barcode detected</div>
          <div class="small" id="detailText">Open Main, then Take Photo, then Scan Photo (local ZXingBrowser).</div>
          <div class="small" id="diagText">diag: waiting for camera</div>
        </div>

        <div class="debug" id="debug">waiting...</div>
      </div>
    </div>

    <script>
      (function () {
        const statusEl = document.getElementById("status");
        const debugEl = document.getElementById("debug");
        const prefLabelEl = document.getElementById("prefLabel");
        const barcodeTextEl = document.getElementById("barcodeText");
        const detailTextEl = document.getElementById("detailText");
        const diagTextEl = document.getElementById("diagText");
        const videoEl = document.getElementById("video");
        const photoPreviewEl = document.getElementById("photoPreview");
        const openMainBtn = document.getElementById("openMainBtn");
        const openDefaultBtn = document.getElementById("openDefaultBtn");
        const takePhotoBtn = document.getElementById("takePhotoBtn");
        const scanPhotoBtn = document.getElementById("scanPhotoBtn");
        const flipBtn = document.getElementById("flipBtn");
        const stopBtn = document.getElementById("stopBtn");

        const state = {
          preferredFacing: "environment",
          stream: null,
          photoBlob: null,
          photoUrl: "",
          reader: null,
          oneDReader: null,
        };
        const VIDEO_PROFILES = [
          { label: "4k", width: 3840, height: 2160 },
          { label: "1440p", width: 2560, height: 1440 },
          { label: "1080p", width: 1920, height: 1080 },
          { label: "720p", width: 1280, height: 720 },
        ];
        const MAX_CANVAS_SIDE = 2200;
        const MAX_CANVAS_PIXELS = 2400000;

        function setStatus(text) {
          statusEl.textContent = text;
        }

        function setDetail(text) {
          detailTextEl.textContent = text;
        }

        function setDiag(text) {
          diagTextEl.textContent = "diag: " + text;
        }

        function log(line) {
          const stamp = new Date().toISOString().slice(11, 19);
          debugEl.textContent = (stamp + " " + line + "\n" + debugEl.textContent).trim();
        }

        function updatePref() {
          prefLabelEl.textContent = "pref: " + state.preferredFacing;
        }

        function normalizeBarcode(value) {
          return String(value || "").replace(/[^\d]/g, "");
        }

        function getSourceSize(source) {
          const width = source.naturalWidth || source.videoWidth || source.width || 0;
          const height = source.naturalHeight || source.videoHeight || source.height || 0;
          return { width: width, height: height };
        }

        function clampCanvasSize(width, height) {
          let w = Math.max(1, Math.floor(width));
          let h = Math.max(1, Math.floor(height));

          if (Math.max(w, h) > MAX_CANVAS_SIDE) {
            const sideScale = MAX_CANVAS_SIDE / Math.max(w, h);
            w = Math.max(1, Math.floor(w * sideScale));
            h = Math.max(1, Math.floor(h * sideScale));
          }

          const pixels = w * h;
          if (pixels > MAX_CANVAS_PIXELS) {
            const pixelScale = Math.sqrt(MAX_CANVAS_PIXELS / pixels);
            w = Math.max(1, Math.floor(w * pixelScale));
            h = Math.max(1, Math.floor(h * pixelScale));
          }

          return { width: w, height: h };
        }

        function releaseCanvas(canvas) {
          if (!canvas) return;
          canvas.width = 1;
          canvas.height = 1;
        }

        function createPreparedCanvas(source, options) {
          const opts = options || {};
          const src = getSourceSize(source);
          const crop = opts.crop || { x: 0, y: 0, w: 1, h: 1 };
          const scale = opts.scale || 1;
          const rotate = opts.rotate || 0;
          const highContrast = Boolean(opts.highContrast);

          const cropX = Math.max(0, Math.floor(src.width * crop.x));
          const cropY = Math.max(0, Math.floor(src.height * crop.y));
          const cropW = Math.max(1, Math.floor(src.width * crop.w));
          const cropH = Math.max(1, Math.floor(src.height * crop.h));
          const constrained = clampCanvasSize(cropW * scale, cropH * scale);
          const outW = constrained.width;
          const outH = constrained.height;
          const rotated = Math.abs(rotate) === 90;

          const canvas = document.createElement("canvas");
          canvas.width = rotated ? outH : outW;
          canvas.height = rotated ? outW : outH;

          const ctx = canvas.getContext("2d", { willReadFrequently: true }) || canvas.getContext("2d");
          if (!ctx) {
            throw new Error("Could not create canvas context");
          }

          ctx.imageSmoothingEnabled = true;
          ctx.imageSmoothingQuality = "high";

          if (rotate === 90) {
            ctx.translate(canvas.width, 0);
            ctx.rotate(Math.PI / 2);
          } else if (rotate === -90) {
            ctx.translate(0, canvas.height);
            ctx.rotate(-Math.PI / 2);
          }

          ctx.drawImage(source, cropX, cropY, cropW, cropH, 0, 0, outW, outH);

          if (highContrast) {
            const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = img.data;
            let sum = 0;

            for (let i = 0; i < data.length; i += 4) {
              sum += 0.2126 * data[i] + 0.7152 * data[i + 1] + 0.0722 * data[i + 2];
            }

            const threshold = Math.max(80, Math.min(200, sum / (data.length / 4)));

            for (let i = 0; i < data.length; i += 4) {
              const luminance = 0.2126 * data[i] + 0.7152 * data[i + 1] + 0.0722 * data[i + 2];
              const value = luminance >= threshold ? 255 : 0;
              data[i] = value;
              data[i + 1] = value;
              data[i + 2] = value;
            }

            ctx.putImageData(img, 0, 0);
          }

          return canvas;
        }

        function getOneDReader() {
          if (!state.oneDReader && typeof ZXingBrowser !== "undefined" && ZXingBrowser.BrowserMultiFormatOneDReader) {
            state.oneDReader = new ZXingBrowser.BrowserMultiFormatOneDReader();
          }

          return state.oneDReader;
        }

        function getMultiReader() {
          if (!state.reader && typeof ZXingBrowser !== "undefined" && ZXingBrowser.BrowserMultiFormatReader) {
            state.reader = new ZXingBrowser.BrowserMultiFormatReader();
          }

          return state.reader;
        }

        async function tryBarcodeDetector(source, label) {
          if (!("BarcodeDetector" in window)) {
            return "";
          }

          try {
            const detector = new BarcodeDetector({
              formats: ["ean_13", "ean_8", "upc_a", "upc_e"]
            });
            const result = await detector.detect(source);
            const value = result && result[0] ? (result[0].rawValue || result[0].value || "") : "";
            const normalized = normalizeBarcode(value);
            if (normalized) {
              log("BarcodeDetector hit (" + label + "): " + normalized);
              return normalized;
            }
          } catch (error) {
            log("BarcodeDetector failed (" + label + "): " + (error.message || error));
          }

          return "";
        }

        async function tryZXingOnImage(image, label) {
          const reader = getOneDReader() || getMultiReader();
          if (!reader) {
            return "";
          }

          try {
            const result = await reader.decodeFromImageElement(image);
            const value = result && result.getText ? result.getText() : "";
            const normalized = normalizeBarcode(value);
            if (normalized) {
              log("ZXing image hit (" + label + "): " + normalized);
              return normalized;
            }
          } catch (error) {
            log("ZXing image miss (" + label + "): " + (error.message || error));
          }

          return "";
        }

        async function tryZXingOnCanvas(canvas, label) {
          const reader = getOneDReader() || getMultiReader();
          if (!reader || !reader.decodeFromCanvas) {
            return "";
          }

          try {
            const result = await reader.decodeFromCanvas(canvas);
            const value = result && result.getText ? result.getText() : "";
            const normalized = normalizeBarcode(value);
            if (normalized) {
              log("ZXing canvas hit (" + label + "): " + normalized);
              return normalized;
            }
          } catch (error) {
            log("ZXing canvas miss (" + label + "): " + (error.message || error));
          }

          return "";
        }

        async function decodeStillPhoto(image) {
          const baseSize = getSourceSize(image);
          log("decode source " + baseSize.width + "x" + baseSize.height);

          const imagePasses = [
            { type: "detector-image", label: "original-image" },
            { type: "zxing-image", label: "original-image" }
          ];
          const canvasPasses = [
            { type: "zxing-canvas", label: "full-1x", options: { scale: 1 } },
            { type: "zxing-canvas", label: "full-1.35x", options: { scale: 1.35 } },
            { type: "zxing-canvas", label: "high-contrast-1.35x", options: { scale: 1.35, highContrast: true } },
            { type: "detector-canvas", label: "high-contrast-1.35x", options: { scale: 1.35, highContrast: true } },
            {
              type: "zxing-canvas",
              label: "center-crop-1.5x",
              options: { crop: { x: 0.07, y: 0.3, w: 0.86, h: 0.42 }, scale: 1.5, highContrast: true }
            },
            { type: "zxing-canvas", label: "rotated-90-1.2x", options: { scale: 1.2, highContrast: true, rotate: 90 } }
          ];

          for (let index = 0; index < imagePasses.length; index += 1) {
            const pass = imagePasses[index];
            const detected = pass.type === "detector-image"
              ? await tryBarcodeDetector(image, pass.label)
              : await tryZXingOnImage(image, pass.label);
            if (detected) {
              return detected;
            }
          }

          for (let index = 0; index < canvasPasses.length; index += 1) {
            const pass = canvasPasses[index];
            let canvas = null;

            try {
              canvas = createPreparedCanvas(image, pass.options);
              log("pass " + pass.label + " canvas=" + canvas.width + "x" + canvas.height);
              const detected = pass.type === "detector-canvas"
                ? await tryBarcodeDetector(canvas, pass.label)
                : await tryZXingOnCanvas(canvas, pass.label);
              if (detected) {
                return detected;
              }
            } catch (error) {
              log("pass failed (" + pass.label + "): " + (error.message || error));
            } finally {
              releaseCanvas(canvas);
            }
          }

          return "";
        }

        function buildVideoAttempts(mode, preferredFacing) {
          const frameRate = { ideal: 30, max: 30 };

          if (mode === "default") {
            return VIDEO_PROFILES.map(function (profile) {
              return {
                video: {
                  width: { ideal: profile.width },
                  height: { ideal: profile.height },
                  frameRate: frameRate
                },
                audio: false
              };
            }).concat([{ video: true, audio: false }]);
          }

          const exactFacingAttempts = VIDEO_PROFILES.map(function (profile) {
            return {
              video: {
                facingMode: { exact: preferredFacing },
                width: { ideal: profile.width },
                height: { ideal: profile.height },
                frameRate: frameRate
              },
              audio: false
            };
          });

          const idealFacingAttempts = VIDEO_PROFILES.map(function (profile) {
            return {
              video: {
                facingMode: { ideal: preferredFacing },
                width: { ideal: profile.width },
                height: { ideal: profile.height },
                frameRate: frameRate
              },
              audio: false
            };
          });

          return exactFacingAttempts.concat(idealFacingAttempts, [{ video: true, audio: false }]);
        }

        async function getPhotoOptions(imageCapture) {
          if (!imageCapture || !imageCapture.getPhotoCapabilities) {
            return {};
          }

          try {
            const caps = await imageCapture.getPhotoCapabilities();
            const maxWidth = caps && caps.imageWidth ? caps.imageWidth.max : 0;
            const maxHeight = caps && caps.imageHeight ? caps.imageHeight.max : 0;

            if (maxWidth > 0 && maxHeight > 0) {
              log("photo caps max=" + maxWidth + "x" + maxHeight);
              return {
                imageWidth: maxWidth,
                imageHeight: maxHeight
              };
            }
          } catch (error) {
            log("photo caps failed: " + (error.message || error));
          }

          return {};
        }

        function clearPhoto() {
          state.photoBlob = null;
          if (state.photoUrl) {
            URL.revokeObjectURL(state.photoUrl);
          }
          state.photoUrl = "";
          photoPreviewEl.removeAttribute("src");
        }

        function stopStream() {
          try {
            if (videoEl.srcObject && videoEl.srcObject.getTracks) {
              videoEl.srcObject.getTracks().forEach(function (track) {
                track.stop();
              });
            }
          } catch (error) {
            log("stop video srcObject failed: " + (error.message || error));
          }

          try {
            if (state.stream && state.stream.getTracks) {
              state.stream.getTracks().forEach(function (track) {
                track.stop();
              });
            }
          } catch (error) {
            log("stop stream failed: " + (error.message || error));
          }

          videoEl.srcObject = null;
          state.stream = null;
          setStatus("Stopped");
          log("stream stopped");
        }

        async function openCamera(mode) {
          stopStream();
          clearPhoto();
          barcodeTextEl.textContent = "No barcode detected";
            setDetail("Open Main, then Take Photo, then Scan Photo (local ZXingBrowser).");
          setDiag("opening " + mode + " camera");
          setStatus("Opening camera...");
          log("mode=" + mode + " pref=" + state.preferredFacing);

          const attempts = buildVideoAttempts(mode, state.preferredFacing);

          let lastError = null;

          for (let index = 0; index < attempts.length; index += 1) {
            try {
              log("trying " + JSON.stringify(attempts[index]));
              state.stream = await navigator.mediaDevices.getUserMedia(attempts[index]);
              videoEl.srcObject = state.stream;
              await videoEl.play();
              const track = state.stream.getVideoTracks()[0];
              const settings = track && track.getSettings ? track.getSettings() : {};
              log("opened label=" + (track && track.label ? track.label : "unknown"));
              log("settings=" + JSON.stringify(settings));
              log("preview size=" + videoEl.videoWidth + "x" + videoEl.videoHeight);
              setDiag("preview " + videoEl.videoWidth + "x" + videoEl.videoHeight);
              setStatus("Camera opened");
              return;
            } catch (error) {
              lastError = error;
              log("failed: " + (error.name || "Error") + " " + (error.message || error));
            }
          }

          setStatus("Open failed");
          setDiag("camera open failed");
          log("all attempts failed: " + ((lastError && (lastError.message || lastError.name)) || "unknown"));
        }

        async function takePhoto() {
          if (!state.stream) {
            setStatus("Open a camera first");
            return;
          }

          const track = state.stream.getVideoTracks()[0];
          if (!track) {
            setStatus("No video track");
            return;
          }

          if (!("ImageCapture" in window)) {
            setStatus("ImageCapture unavailable");
            setDetail("Rabbit opened the camera, but ImageCapture is not available in this runtime.");
            log("ImageCapture unavailable");
            return;
          }

          try {
            setStatus("Taking photo...");
            const imageCapture = new ImageCapture(track);
            const photoOptions = await getPhotoOptions(imageCapture);
            const hasPhotoOptions = Boolean(photoOptions.imageWidth && photoOptions.imageHeight);
            let blob;

            if (hasPhotoOptions) {
              try {
                blob = await imageCapture.takePhoto(photoOptions);
                log("takePhoto with max options");
              } catch (error) {
                log("takePhoto with options failed: " + (error.message || error));
                blob = await imageCapture.takePhoto();
              }
            } else {
              blob = await imageCapture.takePhoto();
            }

            clearPhoto();
            state.photoBlob = blob;
            state.photoUrl = URL.createObjectURL(blob);
            photoPreviewEl.src = state.photoUrl;

            try {
              const photoImage = await loadPreviewImage();
              log("photo dimensions=" + photoImage.naturalWidth + "x" + photoImage.naturalHeight);
              setDiag("photo " + photoImage.naturalWidth + "x" + photoImage.naturalHeight);
            } catch (error) {
              log("photo dimensions unavailable: " + (error.message || error));
              setDiag("photo dimensions unavailable");
            }

            setStatus("Photo captured");
            setDetail("Photo captured. Press Scan Photo.");
            log("photo blob size=" + blob.size);
            log("photo blob type=" + blob.type);
          } catch (error) {
            setStatus("Take photo failed");
            setDetail("takePhoto() failed in this runtime.");
            log("takePhoto failed: " + (error.message || error));
          }
        }

        async function loadPreviewImage() {
          if (!state.photoUrl) {
            throw new Error("No photo URL available");
          }

          const image = new Image();
          image.src = state.photoUrl;

          await new Promise(function (resolve, reject) {
            image.onload = resolve;
            image.onerror = reject;
          });

          return image;
        }

        async function scanPhoto() {
          if (!state.photoBlob || !state.photoUrl) {
            setStatus("Take a photo first");
            return;
          }

          setStatus("Scanning photo...");
          setDetail("Trying BarcodeDetector + ZXing passes.");

          try {
            const image = await loadPreviewImage();
            let detected = await decodeStillPhoto(image);
            if (!detected) {
              setStatus("No barcode found");
              setDetail("No barcode found after multi-pass decode.");
              setDiag("photo " + image.naturalWidth + "x" + image.naturalHeight + ", decode miss");
              barcodeTextEl.textContent = "No barcode detected";
              return;
            }

            barcodeTextEl.textContent = "Barcode " + detected;
            setStatus("Barcode found");
            setDetail("Still-photo decode worked.");
            setDiag("decoded " + detected.length + " digits");
            log("detected barcode " + detected);
          } catch (error) {
            setStatus("Scan photo failed");
            setDetail("Still-photo decode failed.");
            setDiag("scan failed");
            log("scanPhoto failed: " + (error.message || error));
          }
        }

        openMainBtn.addEventListener("click", function () {
          openCamera("preferred");
        });

        openDefaultBtn.addEventListener("click", function () {
          openCamera("default");
        });

        takePhotoBtn.addEventListener("click", function () {
          takePhoto();
        });

        scanPhotoBtn.addEventListener("click", function () {
          scanPhoto();
        });

        flipBtn.addEventListener("click", function () {
          state.preferredFacing = state.preferredFacing === "environment" ? "user" : "environment";
          updatePref();
          setStatus("Preference: " + state.preferredFacing);
          log("preference changed to " + state.preferredFacing);
        });

        stopBtn.addEventListener("click", function () {
          stopStream();
          clearPhoto();
        });

        window.addEventListener("sideClick", function () {
          takePhoto();
        });

        window.addEventListener("longPressStart", function () {
          state.preferredFacing = state.preferredFacing === "environment" ? "user" : "environment";
          updatePref();
          setStatus("Preference: " + state.preferredFacing);
          log("long press changed preference to " + state.preferredFacing);
        });

        updatePref();
        log("build PHOTO-2026-03-04-Q");
        log("PluginMessageHandler=" + (typeof window.PluginMessageHandler !== "undefined"));
        log("creationStorage=" + Boolean(window.creationStorage && window.creationStorage.plain));
        log("mediaDevices=" + Boolean(navigator.mediaDevices));
        log("getUserMedia=" + Boolean(navigator.mediaDevices && navigator.mediaDevices.getUserMedia));
        log("ImageCapture=" + Boolean(window.ImageCapture));
        log("BarcodeDetector=" + Boolean(window.BarcodeDetector));
        log("scan mode=BarcodeDetector + ZXingBrowser multi-pass");
        setStatus("Ready");
        setDiag("ready");
      })();
    </script>
  </body>
</html>
