<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=240, height=282, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>CD Catalog</title>
    <link rel="stylesheet" href="./styles.css" />

    <!-- ZXing (barcode scanning) - use latest -->
    <script src="https://unpkg.com/@zxing/browser@latest"></script>
  </head>

  <body>
    <div id="app">
      <header>
        <div class="title">CD Catalog</div>
        <div class="status" id="status">Idle</div>
      </header>

      <main>
        <!-- Scan -->
        <section class="screen active" id="screen-scan">
          <div class="preview-wrap">
            <video id="video" autoplay muted playsinline></video>
          </div>

          <div class="controls">
            <button id="btn-permission" class="btn primary">📷 Permission</button>
            <button id="btn-start" class="btn primary">▶ Scan</button>
            <button id="btn-stop" class="btn">■ Stop</button>
          </div>

          <div class="hint">
            Tip: Bright light + getting close helps a lot on the R1 (no torch).
          </div>
        </section>

        <!-- Result -->
        <section class="screen" id="screen-result">
          <div class="card">
            <div class="label">Scanned</div>
            <div class="value" id="scannedValue">—</div>
          </div>

          <div class="controls">
            <button id="btn-search" class="btn primary">🔎 Search</button>
            <button id="btn-scan-again" class="btn">↩ Scan again</button>
          </div>
        </section>

        <!-- Search -->
        <section class="screen" id="screen-search">
          <div class="card">
            <div class="label">Manual Search</div>
            <input id="manualInput" placeholder="Enter UPC or artist/album" />
          </div>

          <div class="controls">
            <button id="btn-manual-search" class="btn primary">🔎 Search</button>
            <button id="btn-back" class="btn">↩ Back</button>
          </div>

          <div id="results"></div>
        </section>

        <!-- Catalog -->
        <section class="screen" id="screen-catalog">
          <div class="catalog-head">
            <div class="title2">Catalog</div>
            <button id="btn-clear" class="btn danger">Clear</button>
          </div>
          <div id="catalogList"></div>
        </section>
      </main>

      <footer>
        <button class="tab active" id="tab-scan">Scan</button>
        <button class="tab" id="tab-search">Search</button>
        <button class="tab" id="tab-catalog">Catalog</button>
      </footer>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
