<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=240, height=282, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>R1 Photo Scan Test</title>
    <script src="./zxing-browser.min.js"></script>
    <style>
      :root {
        --bg: #111111;
        --panel: #1d1d1d;
        --line: #343434;
        --text: #f7f1e7;
        --muted: #b9ad9a;
        --accent: #f97316;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 240px;
        height: 282px;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, sans-serif;
      }

      body {
        padding: 5px;
      }

      .app {
        height: 100%;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 4px;
      }

      .build {
        padding: 3px 6px;
        border-radius: 999px;
        background: rgba(249, 115, 22, 0.16);
        color: #ffb37a;
        font-size: 9px;
        font-weight: 700;
      }

      .card,
      .debug {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--panel);
      }

      .card {
        padding: 5px;
      }

      .status-value {
        font-size: 10px;
        font-weight: 700;
        word-break: break-word;
      }

      video,
      img {
        width: 100%;
        height: 38px;
        border-radius: 8px;
        background: #000;
        object-fit: cover;
        display: block;
      }

      img {
        margin-top: 3px;
      }

      .buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 5px;
      }

      button {
        appearance: none;
        min-height: 24px;
        border: 1px solid var(--line);
        border-radius: 9px;
        background: #2a2a2a;
        color: var(--text);
        font-size: 9px;
        font-weight: 700;
        padding: 0 4px;
      }

      button.primary {
        background: var(--accent);
        border-color: #fdba74;
        color: #1a1209;
      }

      .scroll {
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
        display: grid;
        gap: 4px;
        padding-right: 2px;
        -webkit-overflow-scrolling: touch;
      }

      .scroll::-webkit-scrollbar,
      .debug::-webkit-scrollbar {
        width: 0;
        height: 0;
      }

      .debug {
        padding: 5px;
        font-size: 8px;
        line-height: 1.25;
        white-space: pre-wrap;
        word-break: break-word;
        overflow: auto;
        min-height: 48px;
      }

      .barcode {
        font-size: 10px;
        font-weight: 700;
      }

      .small {
        font-size: 9px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="top">
        <div class="build">PHOTO-2026-03-04-O</div>
        <div class="status-value" id="status">Idle</div>
      </div>

      <div class="card">
        <video id="video" autoplay muted playsinline></video>
        <img id="photoPreview" alt="Captured photo preview" />
      </div>

      <div class="scroll">
        <div class="card">
          <div class="buttons">
            <button class="primary" id="openMainBtn" type="button">Open Main</button>
            <button id="openDefaultBtn" type="button">Open Default</button>
            <button class="primary" id="takePhotoBtn" type="button">Take Photo</button>
            <button id="scanPhotoBtn" type="button">Scan Photo</button>
            <button id="flipBtn" type="button">Flip Pref</button>
            <button id="stopBtn" type="button">Stop</button>
          </div>
        </div>

        <div class="card">
          <div class="small" id="prefLabel">pref: environment</div>
          <div class="barcode" id="barcodeText">No barcode detected</div>
          <div class="small" id="detailText">Open Main, then Take Photo, then Scan Photo (local ZXingBrowser).</div>
        </div>

        <div class="debug" id="debug">waiting...</div>
      </div>
    </div>

    <script>
      (function () {
        const statusEl = document.getElementById("status");
        const debugEl = document.getElementById("debug");
        const prefLabelEl = document.getElementById("prefLabel");
        const barcodeTextEl = document.getElementById("barcodeText");
        const detailTextEl = document.getElementById("detailText");
        const videoEl = document.getElementById("video");
        const photoPreviewEl = document.getElementById("photoPreview");
        const openMainBtn = document.getElementById("openMainBtn");
        const openDefaultBtn = document.getElementById("openDefaultBtn");
        const takePhotoBtn = document.getElementById("takePhotoBtn");
        const scanPhotoBtn = document.getElementById("scanPhotoBtn");
        const flipBtn = document.getElementById("flipBtn");
        const stopBtn = document.getElementById("stopBtn");

        const state = {
          preferredFacing: "environment",
          stream: null,
          photoBlob: null,
          photoUrl: "",
          reader: null,
        };

        function setStatus(text) {
          statusEl.textContent = text;
        }

        function setDetail(text) {
          detailTextEl.textContent = text;
        }

        function log(line) {
          const stamp = new Date().toISOString().slice(11, 19);
          debugEl.textContent = (stamp + " " + line + "\n" + debugEl.textContent).trim();
        }

        function updatePref() {
          prefLabelEl.textContent = "pref: " + state.preferredFacing;
        }

        function normalizeBarcode(value) {
          return String(value || "").replace(/[^\d]/g, "");
        }

        function clearPhoto() {
          state.photoBlob = null;
          if (state.photoUrl) {
            URL.revokeObjectURL(state.photoUrl);
          }
          state.photoUrl = "";
          photoPreviewEl.removeAttribute("src");
        }

        function stopStream() {
          try {
            if (videoEl.srcObject && videoEl.srcObject.getTracks) {
              videoEl.srcObject.getTracks().forEach(function (track) {
                track.stop();
              });
            }
          } catch (error) {
            log("stop video srcObject failed: " + (error.message || error));
          }

          try {
            if (state.stream && state.stream.getTracks) {
              state.stream.getTracks().forEach(function (track) {
                track.stop();
              });
            }
          } catch (error) {
            log("stop stream failed: " + (error.message || error));
          }

          videoEl.srcObject = null;
          state.stream = null;
          setStatus("Stopped");
          log("stream stopped");
        }

        async function tryApplyEnhancementConstraints(track) {
          if (!track || !track.applyConstraints) return;

          // Best-effort. Many runtimes ignore or reject these.
          const candidates = [
            { advanced: [{ focusMode: "continuous" }] },
            { advanced: [{ exposureMode: "continuous" }] },
            { advanced: [{ whiteBalanceMode: "continuous" }] },
            { advanced: [{ focusMode: "continuous" }, { exposureMode: "continuous" }] },
          ];

          for (let i = 0; i < candidates.length; i += 1) {
            try {
              await track.applyConstraints(candidates[i]);
              log("applied constraints " + JSON.stringify(candidates[i]));
              return;
            } catch (error) {
              // Ignore.
            }
          }
        }

        async function openCamera(mode) {
          stopStream();
          clearPhoto();
          barcodeTextEl.textContent = "No barcode detected";
            setDetail("Open Main, then Take Photo, then Scan Photo (local ZXingBrowser).");
          setStatus("Opening camera...");
          log("mode=" + mode + " pref=" + state.preferredFacing);

          // Barcode scanning benefits massively from resolution + sharp focus.
          // 640x480 is often too small for UPC/EAN bars on a CD case.
          const attempts = mode === "default"
            ? [{ video: true, audio: false }]
            : [
                {
                  video: {
                    facingMode: { exact: state.preferredFacing },
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                  },
                  audio: false
                },
                {
                  video: {
                    facingMode: { ideal: state.preferredFacing },
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                  },
                  audio: false
                },
                {
                  video: {
                    facingMode: { ideal: state.preferredFacing },
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                  },
                  audio: false
                },
                { video: true, audio: false }
              ];

          let lastError = null;

          for (let index = 0; index < attempts.length; index += 1) {
            try {
              log("trying " + JSON.stringify(attempts[index]));
              state.stream = await navigator.mediaDevices.getUserMedia(attempts[index]);
              videoEl.srcObject = state.stream;
              await videoEl.play();
              const track = state.stream.getVideoTracks()[0];
              const settings = track && track.getSettings ? track.getSettings() : {};
              log("opened label=" + (track && track.label ? track.label : "unknown"));
              log("settings=" + JSON.stringify(settings));
              await tryApplyEnhancementConstraints(track);
              setStatus("Camera opened");
              return;
            } catch (error) {
              lastError = error;
              log("failed: " + (error.name || "Error") + " " + (error.message || error));
            }
          }

          setStatus("Open failed");
          log("all attempts failed: " + ((lastError && (lastError.message || lastError.name)) || "unknown"));
        }

        async function takePhoto() {
          if (!state.stream) {
            setStatus("Open a camera first");
            return;
          }

          const track = state.stream.getVideoTracks()[0];
          if (!track) {
            setStatus("No video track");
            return;
          }

          if (!("ImageCapture" in window)) {
            setStatus("ImageCapture unavailable");
            setDetail("Rabbit opened the camera, but ImageCapture is not available in this runtime.");
            log("ImageCapture unavailable");
            return;
          }

          try {
            setStatus("Taking photo...");
            const imageCapture = new ImageCapture(track);

            // Request the max supported capture resolution when possible.
            let photoSettings = null;
            try {
              if (imageCapture.getPhotoCapabilities) {
                const caps = await imageCapture.getPhotoCapabilities();
                if (caps && caps.imageWidth && caps.imageHeight) {
                  photoSettings = {
                    imageWidth: caps.imageWidth.max,
                    imageHeight: caps.imageHeight.max,
                  };
                  log(
                    "photoCaps=" +
                      JSON.stringify({
                        w: caps.imageWidth,
                        h: caps.imageHeight,
                      })
                  );
                  log("photoSettings=" + JSON.stringify(photoSettings));
                }
              }
            } catch (error) {
              log("getPhotoCapabilities failed: " + (error.message || error));
            }

            let blob = null;
            try {
              blob = await imageCapture.takePhoto(photoSettings || undefined);
            } catch (error) {
              // Some runtimes reject takePhoto settings. Fallback to grabFrame.
              log("takePhoto() failed, trying grabFrame(): " + (error.message || error));
              if (imageCapture.grabFrame) {
                const frame = await imageCapture.grabFrame();
                const canvas = document.createElement("canvas");
                canvas.width = frame.width;
                canvas.height = frame.height;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(frame, 0, 0);
                blob = await new Promise(function (resolve) {
                  canvas.toBlob(
                    function (result) {
                      resolve(result);
                    },
                    "image/jpeg",
                    0.95
                  );
                });
              }
            }

            if (!blob) {
              throw new Error("Unable to capture photo blob");
            }

            clearPhoto();
            state.photoBlob = blob;
            state.photoUrl = URL.createObjectURL(blob);
            photoPreviewEl.src = state.photoUrl;
            setStatus("Photo captured");
            setDetail("Photo captured. Press Scan Photo.");
            log("photo blob size=" + blob.size);
            log("photo blob type=" + blob.type);
          } catch (error) {
            setStatus("Take photo failed");
            setDetail("takePhoto() failed in this runtime.");
            log("takePhoto failed: " + (error.message || error));
          }
        }

        function clampByte(value) {
          return value < 0 ? 0 : value > 255 ? 255 : value;
        }

        function grayscaleAndBoostContrast(imageData, contrast) {
          const data = imageData.data;
          const hist = new Array(256);
          for (let i = 0; i < 256; i += 1) hist[i] = 0;

          // Convert to grayscale + contrast, while building histogram.
          for (let i = 0; i < data.length; i += 4) {
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];
            let v = Math.round(0.299 * r + 0.587 * g + 0.114 * b);
            v = clampByte(Math.round((v - 128) * contrast + 128));
            data[i] = v;
            data[i + 1] = v;
            data[i + 2] = v;
            data[i + 3] = 255;
            hist[v] += 1;
          }

          return hist;
        }

        function otsuThreshold(hist, total) {
          let sum = 0;
          for (let i = 0; i < 256; i += 1) sum += i * hist[i];

          let sumB = 0;
          let wB = 0;
          let wF = 0;
          let varMax = 0;
          let threshold = 128;

          for (let t = 0; t < 256; t += 1) {
            wB += hist[t];
            if (wB === 0) continue;
            wF = total - wB;
            if (wF === 0) break;

            sumB += t * hist[t];
            const mB = sumB / wB;
            const mF = (sum - sumB) / wF;
            const between = wB * wF * (mB - mF) * (mB - mF);

            if (between > varMax) {
              varMax = between;
              threshold = t;
            }
          }

          return threshold;
        }

        function thresholdToBinarized(imageData, threshold, invert) {
          const data = imageData.data;
          for (let i = 0; i < data.length; i += 4) {
            const v = data[i];
            const on = v > threshold ? 255 : 0;
            const out = invert ? 255 - on : on;
            data[i] = out;
            data[i + 1] = out;
            data[i + 2] = out;
            data[i + 3] = 255;
          }
        }

        function makeCanvas(width, height) {
          const canvas = document.createElement("canvas");
          canvas.width = Math.max(1, Math.round(width));
          canvas.height = Math.max(1, Math.round(height));
          return canvas;
        }

        function drawCropToCanvas(image, crop) {
          const iw = image.naturalWidth || image.width;
          const ih = image.naturalHeight || image.height;
          const sx = Math.max(0, Math.round(crop.sx));
          const sy = Math.max(0, Math.round(crop.sy));
          const sw = Math.max(1, Math.round(crop.sw));
          const sh = Math.max(1, Math.round(crop.sh));

          // Keep enough pixels for decoding, but avoid huge canvases.
          const maxDim = 1600;
          const scale = Math.min(1, maxDim / Math.max(sw, sh));
          const dw = Math.max(1, Math.round(sw * scale));
          const dh = Math.max(1, Math.round(sh * scale));

          const canvas = makeCanvas(dw, dh);
          const ctx = canvas.getContext("2d", { willReadFrequently: true });
          ctx.drawImage(image, sx, sy, sw, sh, 0, 0, dw, dh);
          return canvas;
        }

        function rotateCanvas90(srcCanvas) {
          const dst = makeCanvas(srcCanvas.height, srcCanvas.width);
          const ctx = dst.getContext("2d");
          ctx.translate(dst.width / 2, dst.height / 2);
          ctx.rotate(Math.PI / 2);
          ctx.drawImage(srcCanvas, -srcCanvas.width / 2, -srcCanvas.height / 2);
          return dst;
        }

        function buildCandidateCanvases(image) {
          const iw = image.naturalWidth || image.width;
          const ih = image.naturalHeight || image.height;
          const crops = [
            { name: "full", sx: 0, sy: 0, sw: iw, sh: ih },
            // Center-ish
            { name: "center", sx: iw * 0.1, sy: ih * 0.2, sw: iw * 0.8, sh: ih * 0.6 },
            // Many CD barcodes sit near the bottom back cover
            { name: "bottom", sx: iw * 0.05, sy: ih * 0.55, sw: iw * 0.9, sh: ih * 0.45 },
            { name: "bottom-tight", sx: iw * 0.1, sy: ih * 0.65, sw: iw * 0.8, sh: ih * 0.35 },
          ];

          const candidates = [];
          for (let i = 0; i < crops.length; i += 1) {
            const base = drawCropToCanvas(image, crops[i]);
            candidates.push({ name: crops[i].name + "-raw", canvas: base });

            // Sideways photo fallback.
            const rot = rotateCanvas90(base);
            candidates.push({ name: crops[i].name + "-rot90", canvas: rot });
          }

          return candidates;
        }

        function buildProcessedVariants(candidate) {
          const variants = [];
          variants.push(candidate);

          // Grayscale + contrast boost
          try {
            const c1 = makeCanvas(candidate.canvas.width, candidate.canvas.height);
            const ctx1 = c1.getContext("2d", { willReadFrequently: true });
            ctx1.drawImage(candidate.canvas, 0, 0);
            const img1 = ctx1.getImageData(0, 0, c1.width, c1.height);
            const hist = grayscaleAndBoostContrast(img1, 1.6);
            ctx1.putImageData(img1, 0, 0);
            variants.push({ name: candidate.name + "-gray", canvas: c1, _hist: hist });

            // Otsu threshold (normal + inverted)
            const total = c1.width * c1.height;
            const thr = otsuThreshold(hist, total);

            const c2 = makeCanvas(c1.width, c1.height);
            const ctx2 = c2.getContext("2d", { willReadFrequently: true });
            ctx2.drawImage(c1, 0, 0);
            const img2 = ctx2.getImageData(0, 0, c2.width, c2.height);
            thresholdToBinarized(img2, thr, false);
            ctx2.putImageData(img2, 0, 0);
            variants.push({ name: candidate.name + "-thresh", canvas: c2 });

            const c3 = makeCanvas(c1.width, c1.height);
            const ctx3 = c3.getContext("2d", { willReadFrequently: true });
            ctx3.drawImage(c1, 0, 0);
            const img3 = ctx3.getImageData(0, 0, c3.width, c3.height);
            thresholdToBinarized(img3, thr, true);
            ctx3.putImageData(img3, 0, 0);
            variants.push({ name: candidate.name + "-threshInv", canvas: c3 });
          } catch (error) {
            // Ignore processing errors.
          }

          return variants;
        }

        function getDetector() {
          if (!("BarcodeDetector" in window)) return null;
          try {
            return new BarcodeDetector({
              formats: ["ean_13", "upc_a", "upc_e", "ean_8", "code_128"],
            });
          } catch (error) {
            try {
              return new BarcodeDetector();
            } catch {
              return null;
            }
          }
        }

        function getReader() {
          if (state.reader) return state.reader;
          if (typeof ZXingBrowser === "undefined" || !ZXingBrowser.BrowserMultiFormatReader) return null;

          // Best-effort try-harder hints.
          try {
            const hints = new Map();
            if (ZXingBrowser.DecodeHintType && ZXingBrowser.BarcodeFormat) {
              hints.set(ZXingBrowser.DecodeHintType.TRY_HARDER, true);
              hints.set(ZXingBrowser.DecodeHintType.POSSIBLE_FORMATS, [
                ZXingBrowser.BarcodeFormat.EAN_13,
                ZXingBrowser.BarcodeFormat.UPC_A,
                ZXingBrowser.BarcodeFormat.UPC_E,
                ZXingBrowser.BarcodeFormat.EAN_8,
                ZXingBrowser.BarcodeFormat.CODE_128,
              ]);
              state.reader = new ZXingBrowser.BrowserMultiFormatReader(hints);
              return state.reader;
            }
          } catch (error) {
            // Ignore.
          }

          state.reader = new ZXingBrowser.BrowserMultiFormatReader();
          return state.reader;
        }

        async function tryDecodeWithDetector(detector, source) {
          if (!detector) return "";
          try {
            const codes = await detector.detect(source);
            if (codes && codes.length) {
              return codes[0].rawValue || codes[0].value || "";
            }
          } catch (error) {
            // Ignore.
          }
          return "";
        }

        async function tryDecodeWithZXing(reader, sourceCanvas) {
          if (!reader) return "";
          try {
            const result = await reader.decodeFromCanvas(sourceCanvas);
            return result && result.getText ? result.getText() : "";
          } catch (error) {
            return "";
          }
        }

        async function deepDecodeBarcodeFromImage(image) {
          const detector = getDetector();
          const reader = getReader();

          log("image=" + (image.naturalWidth || image.width) + "x" + (image.naturalHeight || image.height));
          log("BarcodeDetector=" + Boolean(detector));
          log("ZXingReader=" + Boolean(reader));

          // Quick pass: raw image element.
          const quick = await tryDecodeWithDetector(detector, image);
          if (quick) return quick;

          // Deep pass: multiple crops/rotations + preprocessing variants.
          const bases = buildCandidateCanvases(image);
          for (let i = 0; i < bases.length; i += 1) {
            const variants = buildProcessedVariants(bases[i]);
            for (let j = 0; j < variants.length; j += 1) {
              const v = variants[j];
              log("try " + v.name + " " + v.canvas.width + "x" + v.canvas.height);

              const d = await tryDecodeWithDetector(detector, v.canvas);
              if (d) return d;

              const z = await tryDecodeWithZXing(reader, v.canvas);
              if (z) return z;
            }
          }

          return "";
        }

        async function loadPreviewImage() {
          if (!state.photoUrl) {
            throw new Error("No photo URL available");
          }

          const image = new Image();
          image.src = state.photoUrl;

          await new Promise(function (resolve, reject) {
            image.onload = resolve;
            image.onerror = reject;
          });

          return image;
        }

        async function scanPhoto() {
          if (!state.photoBlob || !state.photoUrl) {
            setStatus("Take a photo first");
            return;
          }

          setStatus("Scanning photo...");
          setDetail(
            "Deep scan: max-res photo + crops + contrast/threshold (BarcodeDetector + ZXing). Tip: if close-ups are blurry, back up so the barcode is sharp."
          );

          try {
            const image = await loadPreviewImage();
            let detected = await deepDecodeBarcodeFromImage(image);
            detected = normalizeBarcode(detected);
            if (!detected) {
              setStatus("No barcode found");
              setDetail(
                "No barcode found. Tips: avoid glare, use brighter light, keep the case flat, and try holding the R1 a bit farther away so the barcode is in focus."
              );
              barcodeTextEl.textContent = "No barcode detected";
              return;
            }

            barcodeTextEl.textContent = "Barcode " + detected;
            setStatus("Barcode found");
            setDetail("Still-photo decode worked.");
            log("detected barcode " + detected);
          } catch (error) {
            setStatus("Scan photo failed");
            setDetail("Still-photo decode failed.");
            log("scanPhoto failed: " + (error.message || error));
          }
        }

        openMainBtn.addEventListener("click", function () {
          openCamera("preferred");
        });

        openDefaultBtn.addEventListener("click", function () {
          openCamera("default");
        });

        takePhotoBtn.addEventListener("click", function () {
          takePhoto();
        });

        scanPhotoBtn.addEventListener("click", function () {
          scanPhoto();
        });

        flipBtn.addEventListener("click", function () {
          state.preferredFacing = state.preferredFacing === "environment" ? "user" : "environment";
          updatePref();
          setStatus("Preference: " + state.preferredFacing);
          log("preference changed to " + state.preferredFacing);
        });

        stopBtn.addEventListener("click", function () {
          stopStream();
          clearPhoto();
        });

        window.addEventListener("sideClick", function () {
          takePhoto();
        });

        window.addEventListener("longPressStart", function () {
          state.preferredFacing = state.preferredFacing === "environment" ? "user" : "environment";
          updatePref();
          setStatus("Preference: " + state.preferredFacing);
          log("long press changed preference to " + state.preferredFacing);
        });

        updatePref();
        log("build PHOTO-2026-03-04-O");
        log("PluginMessageHandler=" + (typeof window.PluginMessageHandler !== "undefined"));
        log("creationStorage=" + Boolean(window.creationStorage && window.creationStorage.plain));
        log("mediaDevices=" + Boolean(navigator.mediaDevices));
        log("getUserMedia=" + Boolean(navigator.mediaDevices && navigator.mediaDevices.getUserMedia));
        log("ImageCapture=" + Boolean(window.ImageCapture));
        log("BarcodeDetector=" + Boolean(window.BarcodeDetector));
        log("scan mode=ZXingBrowser only");
        setStatus("Ready");
      })();
    </script>
  </body>
</html>
