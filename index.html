<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=240, height=282, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>R1 Camera Test</title>
    <style>
      :root {
        color-scheme: light only;
        --bg: #111111;
        --panel: #1d1d1d;
        --line: #343434;
        --text: #f7f1e7;
        --muted: #b9ad9a;
        --accent: #f97316;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 240px;
        height: 282px;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, sans-serif;
      }

      body {
        padding: 10px;
      }

      .app {
        height: 100%;
        display: grid;
        grid-template-rows: auto auto auto auto 1fr auto;
        gap: 8px;
      }

      .build {
        display: inline-block;
        padding: 4px 7px;
        border-radius: 999px;
        background: rgba(249, 115, 22, 0.18);
        color: #ffb37a;
        font-size: 11px;
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-size: 18px;
      }

      .status,
      .debug,
      .card {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--panel);
      }

      .status,
      .card {
        padding: 8px;
      }

      .status-label,
      .small {
        color: var(--muted);
        font-size: 11px;
      }

      .status-value {
        margin-top: 4px;
        font-size: 13px;
        font-weight: 700;
        word-break: break-word;
      }

      .buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      button {
        appearance: none;
        min-height: 36px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #2a2a2a;
        color: var(--text);
        font-size: 12px;
        font-weight: 700;
      }

      button.primary {
        background: var(--accent);
        border-color: #fdba74;
        color: #1a1209;
      }

      video {
        width: 100%;
        height: 96px;
        border-radius: 10px;
        background: #000;
        object-fit: cover;
      }

      .debug {
        padding: 6px;
        overflow: auto;
        font-size: 10px;
        line-height: 1.3;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="build">CAM-2026-03-04-F</div>

      <div>
        <h1>R1 Camera Test</h1>
        <div class="small">Single-file diagnostic build</div>
      </div>

      <div class="status">
        <div class="status-label">Status</div>
        <div class="status-value" id="status">Idle</div>
      </div>

      <div class="buttons">
        <button class="primary" id="openBtn" type="button">Open Camera</button>
        <button id="flipBtn" type="button">Flip Pref</button>
        <button id="defaultBtn" type="button">Open Default</button>
        <button id="stopBtn" type="button">Stop</button>
      </div>

      <div class="card">
        <video id="video" autoplay muted playsinline></video>
      </div>

      <div class="debug" id="debug">waiting...</div>
    </div>

    <script>
      (function () {
        const statusEl = document.getElementById("status");
        const debugEl = document.getElementById("debug");
        const videoEl = document.getElementById("video");
        const openBtn = document.getElementById("openBtn");
        const defaultBtn = document.getElementById("defaultBtn");
        const flipBtn = document.getElementById("flipBtn");
        const stopBtn = document.getElementById("stopBtn");

        let stream = null;
        let preferredFacing = "environment";

        function setStatus(text) {
          statusEl.textContent = text;
        }

        function log(line) {
          const stamp = new Date().toISOString().slice(11, 19);
          debugEl.textContent = `${stamp} ${line}\n${debugEl.textContent}`.trim();
        }

        function stopStream() {
          try {
            if (videoEl.srcObject && videoEl.srcObject.getTracks) {
              videoEl.srcObject.getTracks().forEach((track) => track.stop());
            }
          } catch (error) {
            log("stop video srcObject failed: " + (error.message || error));
          }

          try {
            if (stream && stream.getTracks) {
              stream.getTracks().forEach((track) => track.stop());
            }
          } catch (error) {
            log("stop stream failed: " + (error.message || error));
          }

          videoEl.srcObject = null;
          stream = null;
          setStatus("Stopped");
          log("stream stopped");
        }

        async function openCamera(mode) {
          stopStream();
          setStatus("Opening...");
          log("preferredFacing=" + preferredFacing);
          log("mode=" + mode);

          const attempts = mode === "default"
            ? [{ video: true, audio: false }]
            : [
                {
                  video: {
                    facingMode: { exact: preferredFacing },
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                  },
                  audio: false
                },
                {
                  video: {
                    facingMode: { ideal: preferredFacing },
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                  },
                  audio: false
                },
                { video: true, audio: false }
              ];

          let lastError = null;

          for (const constraints of attempts) {
            try {
              log("trying " + JSON.stringify(constraints));
              stream = await navigator.mediaDevices.getUserMedia(constraints);
              videoEl.srcObject = stream;
              await videoEl.play();

              const track = stream.getVideoTracks()[0];
              const settings = track && track.getSettings ? track.getSettings() : {};
              const label = track && track.label ? track.label : "unknown";

              setStatus("Camera opened");
              log("opened label=" + label);
              log("settings=" + JSON.stringify(settings));
              return;
            } catch (error) {
              lastError = error;
              log("failed: " + (error.name || "Error") + " " + (error.message || error));
            }
          }

          setStatus("Open failed");
          log("all attempts failed: " + ((lastError && (lastError.message || lastError.name)) || "unknown"));
        }

        openBtn.addEventListener("click", function () {
          openCamera("preferred");
        });

        defaultBtn.addEventListener("click", function () {
          openCamera("default");
        });

        flipBtn.addEventListener("click", function () {
          preferredFacing = preferredFacing === "environment" ? "user" : "environment";
          setStatus("Preference: " + preferredFacing);
          log("preference changed to " + preferredFacing);
        });

        stopBtn.addEventListener("click", function () {
          stopStream();
        });

        window.addEventListener("sideClick", function () {
          openCamera("preferred");
        });

        window.addEventListener("longPressStart", function () {
          preferredFacing = preferredFacing === "environment" ? "user" : "environment";
          setStatus("Preference: " + preferredFacing);
          log("long press changed preference to " + preferredFacing);
        });

        log("build CAM-2026-03-04-F");
        log("PluginMessageHandler=" + (typeof window.PluginMessageHandler !== "undefined"));
        log("creationStorage=" + Boolean(window.creationStorage && window.creationStorage.plain));
        log("mediaDevices=" + Boolean(navigator.mediaDevices));
        log("getUserMedia=" + Boolean(navigator.mediaDevices && navigator.mediaDevices.getUserMedia));
      })();
    </script>
  </body>
</html>
